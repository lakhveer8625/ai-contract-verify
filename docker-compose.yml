services:
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_WS_URL: ws://localhost:4000
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://auditor:auditor@postgres:5432/auditor?schema=public
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
      REPORT_DIR: /app/reports
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
    depends_on:
      - postgres
      - redis
      - slither
      - mythril

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auditor
      POSTGRES_PASSWORD: auditor
      POSTGRES_DB: auditor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  slither:
    build:
      context: ./docker/slither
      dockerfile: Dockerfile
    command: ["sleep", "infinity"]

  mythril:
    build:
      context: ./docker/mythril
      dockerfile: Dockerfile
    command: ["sleep", "infinity"]

volumes:
  postgres-data:
  uploads:
  reports:
